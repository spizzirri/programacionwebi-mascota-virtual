name: Pruebas unitarias automáticas
run-name: ${{ github.actor }} está ejecutando pruebas unitarias
on:
  push:
    branches: [ main ]
  pull_request:
jobs:
  pruebas_unitarias:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Instalar dependencias
        run: npm ci
      - name: Validar codigo estático
        run: npm run type-check
      - name: Correr pruebas
        run: npm run test

  pruebas_punta_a_punta:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Instalar dependencias
        run: npm ci
      - name: Instalar navegadores Playwright
        run: npx playwright install --with-deps chromium
      - name: Inicia ambiente de pruebas
        run: |
          npm run start:e2e:env
          npx -y wait-on tcp:27018 tcp:8080 --timeout 30000
      - name: Inicia servidor y correr pruebas
        run: |
          npm run dev:e2e &
          npx -y wait-on http-get://localhost:5173 http-get://localhost:3000 --timeout 60000
          npm run test:e2e

