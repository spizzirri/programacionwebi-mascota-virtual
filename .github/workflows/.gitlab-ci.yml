name: Pruebas unitarias automáticas
run-name: ${{ github.actor }} está ejecutando pruebas unitarias
on:
  push:
    branches: [ main ]
  pull_request:
jobs:
  pruebas_unitarias:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Instalar dependencias
        run: npm ci
      - name: Validar codigo estático
        run: npm run type-check
      - name: Correr pruebas
        run: npm run test


